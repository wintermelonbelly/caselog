<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>超级侦探认真办案 | CaseLog</title>

<!-- PWA 基础 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4a853">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;
  --gold:#d4a853;--gold-dim:rgba(212,168,83,.12);--gold-mid:rgba(212,168,83,.3);
  --txt:#e6e1d8;--txt2:#8b8685;--txt3:#555;
  --green:#56d364;--red:#f85149;
  --r:12px;--nav:64px
}
body{
  font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh;
  overflow-x:hidden;padding-bottom:80px;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

header{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:16px 20px 12px;border-bottom:1px solid var(--gold-dim);
}
.badge{
  display:inline-block;font-family:'Courier New',monospace;
  font-size:10px;color:var(--gold);background:var(--gold-dim);
  padding:2px 10px;border-radius:20px;letter-spacing:2px;margin-bottom:4px;
}
header h1{font-size:20px;font-weight:700}
header .sub{font-size:12px;color:var(--txt2);margin-top:2px}

main{padding:16px 16px 90px}
.panel{display:none;animation:fadeUp .3s ease}.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.btn-p{
  display:block;width:100%;padding:13px;background:var(--gold);color:var(--bg);
  border:none;border-radius:var(--r);font-size:15px;font-weight:600;
  cursor:pointer;margin-top:14px;touch-action:manipulation;-webkit-appearance:none;
}
.btn-p:active{opacity:.8}
.btn-s{
  display:block;width:100%;padding:11px;background:var(--bg2);color:var(--txt2);
  border:1px solid var(--gold-dim);border-radius:var(--r);font-size:13px;
  cursor:pointer;margin-top:10px;touch-action:manipulation;-webkit-appearance:none;
}
.btn-s:active{background:var(--bg3)}
.empty{text-align:center;padding:48px 20px;color:var(--txt2)}
.empty i{font-size:48px;font-style:normal;display:block;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.7}

/* Todo */
.todo-bar{display:flex;gap:8px;margin-bottom:14px}
.todo-bar input{
  flex:1;background:var(--bg2);border:1px solid var(--gold-dim);
  border-radius:var(--r);padding:11px 14px;color:var(--txt);
  font-size:14px;outline:none;-webkit-appearance:none;
}
.todo-bar input:focus{border-color:var(--gold)}
.todo-bar input::placeholder{color:var(--txt2)}
.todo-bar button{
  width:48px;min-width:48px;border-radius:var(--r);background:var(--gold);
  color:var(--bg);border:none;font-size:24px;font-weight:700;
  cursor:pointer;touch-action:manipulation;-webkit-appearance:none;
}
.prog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.prog-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:2px;transition:width .5s;width:0}
.prog span{font-size:11px;color:var(--txt2);white-space:nowrap}
.t-list{list-style:none}
.t-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.t-circle{
  width:24px;height:24px;min-width:24px;border-radius:50%;
  border:2px solid var(--gold-mid);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;touch-action:manipulation;background:transparent;
}
.t-item.done .t-circle{background:var(--gold);border-color:var(--gold)}
.t-item.done .t-circle::after{content:'✓';color:var(--bg);font-size:12px;font-weight:700}
.t-text{flex:1;font-size:14px;transition:all .4s;line-height:1.4}
.t-item.done .t-text{color:var(--txt3);text-decoration:line-through}
.t-del{
  background:none;border:none;color:var(--txt2);font-size:18px;
  cursor:pointer;padding:8px;touch-action:manipulation;
  min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;
}
.t-del:active{color:var(--red)}
.t-time{font-size:10px;color:var(--txt2);margin-top:2px}

/* Pomo */
.pomo-wrap{position:relative;width:200px;height:200px;margin:24px auto 20px}
.pomo-svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-bg{fill:none;stroke:var(--bg3);stroke-width:6}
.pomo-prog{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;stroke-dasharray:565.49;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.pomo-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-family:'Courier New',monospace;font-size:40px;font-weight:700}
.pomo-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,60%);font-size:12px;color:var(--txt2)}
.pomo-ctrls{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pomo-ctrls button{padding:12px 28px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;touch-action:manipulation;-webkit-appearance:none}
.pomo-ctrls button:active{opacity:.8}
.pc-start{background:var(--gold);color:var(--bg)}
.pc-reset{background:var(--bg2);color:var(--txt2);border:1px solid var(--gold-dim)!important}
.modes{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.mode-btn{padding:8px 14px;background:var(--bg2);border:1px solid var(--gold-dim);color:var(--txt2);border-radius:20px;font-size:12px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
.mode-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-mid)}
.pomo-stats{display:flex;justify-content:center;gap:36px;margin-top:16px}
.st{text-align:center}
.st b{display:block;font-size:26px;color:var(--gold);font-family:'Courier New',monospace}
.st small{font-size:11px;color:var(--txt2)}

/* Habit */
.h-card{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:14px;border:1px solid var(--gold-dim)}
.h-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.h-name{font-size:15px;font-weight:600}
.h-streak{font-size:11px;color:var(--gold);background:var(--gold-dim);padding:2px 8px;border-radius:10px;margin-right:8px}
.h-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px}
.h-day{
  aspect-ratio:1;border-radius:50%;border:2px solid var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--txt2);cursor:pointer;touch-action:manipulation;transition:all .2s;
}
.h-day.checked{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:700}
.h-day.missed{border-color:rgba(248,81,73,.4);color:rgba(248,81,73,.5)}
.h-day.today{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-dim)}
.h-day.future{opacity:.25;pointer-events:none}
.h-prog{font-size:11px;color:var(--txt2);text-align:center}
.h-del{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;padding:4px 8px;touch-action:manipulation}

/* Goal */
.g-card{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;border-left:3px solid var(--gold)}
.g-card.high{border-left-color:var(--red)}.g-card.medium{border-left-color:var(--gold)}.g-card.low{border-left-color:var(--green)}
.g-card.g-done{opacity:.5}.g-card.g-done .g-text{text-decoration:line-through;color:var(--txt3)}
.g-text{font-size:14px;margin-bottom:6px;line-height:1.5}
.g-meta{display:flex;justify-content:space-between;align-items:center}
.g-dl{font-size:11px;color:var(--txt2)}
.g-acts{display:flex;gap:4px}
.g-acts button{background:none;border:none;color:var(--txt2);font-size:16px;cursor:pointer;padding:6px 8px;touch-action:manipulation;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}

/* Intel - 单卡片 */
.intel-card{
  background:var(--bg2);border-radius:16px;padding:20px;
  border:1px solid var(--gold-dim);position:relative;overflow:hidden;
}
.intel-type{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--gold);background:var(--gold-dim);
  padding:4px 12px;border-radius:20px;margin-bottom:14px;
}
.intel-title{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:10px;line-height:1.4}
.intel-body{font-size:14px;color:#b5b0a8;line-height:1.9;margin-bottom:14px}
.intel-tag{font-size:11px;color:var(--txt2);padding:3px 10px;background:var(--bg3);border-radius:6px;display:inline-block}

/* 音乐播放器 */
.music-player{
  background:var(--bg);border-radius:12px;padding:16px;
  margin-top:14px;border:1px solid var(--gold-dim);
}
.mp-info{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.mp-cover{
  width:56px;height:56px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold-dim),var(--bg3));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.mp-cover.playing{animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.mp-text h4{font-size:14px;margin-bottom:3px;color:var(--txt)}
.mp-text p{font-size:11px;color:var(--txt2)}
.mp-controls{display:flex;align-items:center;gap:12px}
.mp-play{
  width:44px;height:44px;border-radius:50%;
  background:var(--gold);color:var(--bg);border:none;
  font-size:18px;cursor:pointer;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;-webkit-appearance:none;
}
.mp-play:active{opacity:.8}
.mp-progress{flex:1;display:flex;flex-direction:column;gap:4px}
.mp-bar-wrap{width:100%;height:6px;background:var(--bg3);border-radius:3px;cursor:pointer;position:relative;touch-action:manipulation}
.mp-bar-fill{height:100%;background:var(--gold);border-radius:3px;width:0;transition:width .3s;pointer-events:none}
.mp-times{display:flex;justify-content:space-between;font-size:10px;color:var(--txt2);font-family:'Courier New',monospace}
.mp-vol{display:flex;align-items:center;gap:6px;margin-top:10px}
.mp-vol span{font-size:14px}
.mp-vol input{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg3);border-radius:2px;outline:none}
.mp-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer}

/* 谜题区 */
.puzzle-reveal{
  margin-top:12px;padding:12px;background:var(--gold-dim);
  border-radius:10px;color:var(--gold);font-size:13px;line-height:1.7;
}
.puzzle-hidden{display:none}

/* 刷新按钮 */
.intel-refresh{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:16px;padding:10px;background:none;border:1px dashed var(--gold-dim);
  border-radius:var(--r);color:var(--txt2);font-size:12px;
  cursor:pointer;touch-action:manipulation;width:100%;-webkit-appearance:none;
}
.intel-refresh:active{background:var(--gold-dim);color:var(--gold)}

/* Nav */
#nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav);
  background:var(--bg2);border-top:1px solid var(--gold-dim);
  display:flex;justify-content:space-around;align-items:center;z-index:200;
}
.nb{
  background:none;border:none;color:var(--txt2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 12px;touch-action:manipulation;-webkit-appearance:none;
  position:relative;min-width:50px;
}
.nb.active{color:var(--gold)}
.nb.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--gold);border-radius:1px}
.nb span:first-child{font-size:20px}.nb span:last-child{font-size:10px}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none!important}
.modal-c{background:var(--bg2);border-radius:18px 18px 0 0;padding:22px 18px 28px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-h h2{font-size:17px}
.modal-x{background:none;border:none;color:var(--txt2);font-size:26px;cursor:pointer;padding:4px 8px;touch-action:manipulation;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.modal-overlay input,.modal-overlay select{width:100%;background:var(--bg);border:1px solid var(--gold-dim);border-radius:var(--r);padding:11px 14px;color:var(--txt);font-size:14px;outline:none;margin-bottom:10px;-webkit-appearance:none}
.modal-overlay input:focus{border-color:var(--gold)}
.modal-overlay select{-webkit-appearance:menulist;appearance:menulist}

/* Calendar */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-nav button{background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;padding:8px 14px;touch-action:manipulation}
.cal-nav span{font-size:14px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-wd{text-align:center;font-size:10px;color:var(--txt2);padding:4px 0}
.cal-d{text-align:center;padding:8px 0;font-size:12px;border-radius:8px;cursor:pointer;color:var(--txt2);touch-action:manipulation;min-height:32px}
.cal-d:active{background:var(--gold-dim)}
.cal-d.has::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin:2px auto 0}
.cal-d.today-c{background:var(--gold-dim);color:var(--gold);font-weight:700}
.cal-d.sel{background:var(--gold)!important;color:var(--bg)!important}
.cal-d.empty-d{visibility:hidden;pointer-events:none}
.ht{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.ht.hd{color:var(--txt3);text-decoration:line-through}
.ht-dot{width:7px;height:7px;border-radius:50%;background:var(--txt2);flex-shrink:0}
.ht.hd .ht-dot{background:var(--gold)}

/* Stamp */
.stamp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg) scale(0);z-index:500;border:4px solid var(--green);border-radius:12px;padding:14px 24px;color:var(--green);font-family:'Courier New',monospace;font-size:26px;font-weight:900;text-align:center;letter-spacing:4px;pointer-events:none;opacity:0}
.stamp.show{animation:stIn .4s ease forwards,stOut .4s 1.6s ease forwards}
@keyframes stIn{0%{transform:translate(-50%,-50%) rotate(-12deg) scale(3);opacity:0}60%{transform:translate(-50%,-50%) rotate(-12deg) scale(.92);opacity:1}100%{transform:translate(-50%,-50%) rotate(-12deg) scale(1);opacity:.95}}
@keyframes stOut{to{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1.1)}}
</style>
</head>
<body>

<header>
  <div class="badge">CASE #<span id="caseNo">001</span></div>
  <h1 id="hTitle">今日案卷</h1>
  <p class="sub" id="hDate"></p>
</header>

<main>
  <section id="pTodo" class="panel active">
    <div class="todo-bar">
      <input id="todoIn" type="text" placeholder="添加新线索..." maxlength="80">
      <button id="todoAdd" type="button">+</button>
    </div>
    <div class="prog" id="progWrap" style="display:none">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <span id="progTxt"></span>
    </div>
    <ul class="t-list" id="todoList"></ul>
    <div class="empty" id="todoEmpty"><i>🔍</i><p>暂无线索<br>添加你今日的第一个任务</p></div>
    <button class="btn-s" id="histBtn" type="button" style="margin-top:20px">📂 查看历史案卷</button>
  </section>

  <section id="pPomo" class="panel">
    <div class="pomo-wrap">
      <svg class="pomo-svg" viewBox="0 0 200 200"><circle class="pomo-bg" cx="100" cy="100" r="90"/><circle class="pomo-prog" id="pomoCir" cx="100" cy="100" r="90"/></svg>
      <div class="pomo-time" id="pomoTime">25:00</div>
      <div class="pomo-lbl" id="pomoLbl">专注模式</div>
    </div>
    <div class="pomo-ctrls">
      <button class="pc-start" id="pomoStart" type="button">开始</button>
      <button class="pc-reset" id="pomoReset" type="button">重置</button>
    </div>
    <div class="modes">
      <button class="mode-btn active" type="button" data-m="25">25 min</button>
      <button class="mode-btn" type="button" data-m="15">15 min</button>
      <button class="mode-btn" type="button" data-m="5">5 min 休息</button>
      <button class="mode-btn" type="button" data-m="45">45 min</button>
    </div>
    <div class="pomo-stats">
      <div class="st"><b id="pomoSess">0</b><small>今日专注</small></div>
      <div class="st"><b id="pomoMins">0</b><small>总分钟数</small></div>
    </div>
  </section>

  <section id="pHabit" class="panel">
    <div id="habitList"></div>
    <div class="empty" id="habitEmpty"><i>🔗</i><p>开启一项21天调查<br>养成一个新习惯</p></div>
    <button class="btn-p" id="addHabitBtn" type="button">+ 新建21天计划</button>
  </section>

  <section id="pGoal" class="panel">
    <div id="goalList"></div>
    <div class="empty" id="goalEmpty"><i>🎯</i><p>设定你的重要目标<br>保持方向感</p></div>
    <button class="btn-p" id="addGoalBtn" type="button">+ 添加目标</button>
  </section>

  <section id="pIntel" class="panel">
    <div id="intelArea"></div>
  </section>
</main>

<nav id="nav">
  <button class="nb active" type="button" data-t="pTodo"><span>📋</span><span>案卷</span></button>
  <button class="nb" type="button" data-t="pPomo"><span>⏱</span><span>专注</span></button>
  <button class="nb" type="button" data-t="pHabit"><span>🔗</span><span>习惯</span></button>
  <button class="nb" type="button" data-t="pGoal"><span>🎯</span><span>目标</span></button>
  <button class="nb" type="button" data-t="pIntel"><span>💡</span><span>线索</span></button>
</nav>

<div class="modal-overlay hidden" id="histModal">
  <div class="modal-c">
    <div class="modal-h"><h2>📂 历史案卷</h2><button class="modal-x" id="histClose" type="button">&times;</button></div>
    <div id="calArea"></div>
    <div id="histDetail"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="habitModal">
  <div class="modal-c">
    <div class="modal-h"><h2>🔗 新建21天计划</h2><button class="modal-x" id="habitClose" type="button">&times;</button></div>
    <input id="habitIn" type="text" placeholder="如：每天冥想15分钟" maxlength="40">
    <button class="btn-p" id="habitConfirm" type="button">开始调查</button>
  </div>
</div>

<div class="modal-overlay hidden" id="goalModal">
  <div class="modal-c">
    <div class="modal-h"><h2>🎯 添加目标</h2><button class="modal-x" id="goalClose" type="button">&times;</button></div>
    <input id="goalIn" type="text" placeholder="输入目标" maxlength="60">
    <select id="goalPri"><option value="high">🔴 高优先级</option><option value="medium" selected>🟡 中优先级</option><option value="low">🟢 低优先级</option></select>
    <input type="date" id="goalDl">
    <button class="btn-p" id="goalConfirm" type="button">确认</button>
  </div>
</div>

<div class="stamp" id="stamp">CASE<br>CLOSED</div>

<script>
(function(){
'use strict';

function $(id){return document.getElementById(id)}
function LS(k){try{return JSON.parse(localStorage.getItem('cl_'+k))}catch(e){return null}}
function SS(k,v){try{localStorage.setItem('cl_'+k,JSON.stringify(v))}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function getToday(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
var CIRC=565.49;

var todos=LS('todos')||{};
var habits=LS('habits')||[];
var goals=LS('goals')||[];
var pomo=LS('pomo')||{sessions:0,mins:0,date:getToday()};

function getTodos(){return todos[getToday()]||[]}
function saveTodos(arr){todos[getToday()]=arr;SS('todos',todos)}

function renderTodos(){
  var arr=getTodos(),list=$('todoList'),empty=$('todoEmpty'),pw=$('progWrap');
  list.innerHTML='';
  if(!arr.length){empty.style.display='';pw.style.display='none';return}
  empty.style.display='none';pw.style.display='flex';
  var done=0;for(var k=0;k<arr.length;k++)if(arr[k].done)done++;
  $('progFill').style.width=Math.round(done/arr.length*100)+'%';
  $('progTxt').textContent=done+'/'+arr.length+' 已破解';

  for(var i=0;i<arr.length;i++){
    (function(idx){
      var t=arr[idx],li=document.createElement('li');
      li.className='t-item'+(t.done?' done':'');
      var circle=document.createElement('div');circle.className='t-circle';
      circle.addEventListener('click',function(e){e.preventDefault();var c=getTodos();c[idx].done=!c[idx].done;saveTodos(c);renderTodos();checkAllDone()});
      var tw=document.createElement('div');tw.style.flex='1';
      var te=document.createElement('div');te.className='t-text';te.textContent=t.text;
      var ti=document.createElement('div');ti.className='t-time';ti.textContent=t.time||'';
      tw.appendChild(te);tw.appendChild(ti);
      var del=document.createElement('button');del.className='t-del';del.type='button';del.textContent='✕';
      del.addEventListener('click',function(e){e.preventDefault();var c=getTodos();c.splice(idx,1);saveTodos(c);renderTodos()});
      li.appendChild(circle);li.appendChild(tw);li.appendChild(del);list.appendChild(li);
    })(i);
  }
}

// ===== Pomodoro =====
var pomoTotal=25*60,pomoLeft=25*60,pomoRun=false,pomoTimer=null;
function updPomo(){
  var m=Math.floor(pomoLeft/60),s=pomoLeft%60;
  $('pomoTime').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  $('pomoCir').style.strokeDashoffset=CIRC*(1-pomoLeft/pomoTotal);
  $('pomoSess').textContent=pomo.sessions;$('pomoMins').textContent=pomo.mins;
}
$('pomoStart').addEventListener('click',function(e){
  e.preventDefault();
  if(pomoRun){clearInterval(pomoTimer);pomoRun=false;$('pomoStart').textContent='继续';$('pomoLbl').textContent='已暂停';return}
  pomoRun=true;$('pomoStart').textContent='暂停';$('pomoLbl').textContent='专注中...';
  pomoTimer=setInterval(function(){
    if(pomoLeft<=0){clearInterval(pomoTimer);pomoRun=false;$('pomoStart').textContent='开始';$('pomoLbl').textContent='完成！';pomo.sessions++;pomo.mins+=Math.round(pomoTotal/60);pomo.date=getToday();SS('pomo',pomo);updPomo();playBeep();return}
    pomoLeft--;updPomo();
  },1000);
});
$('pomoReset').addEventListener('click',function(e){e.preventDefault();clearInterval(pomoTimer);pomoRun=false;pomoLeft=pomoTotal;$('pomoStart').textContent='开始';$('pomoLbl').textContent='专注模式';updPomo()});

function renderHabits(){
  var wrap=$('habitList');wrap.innerHTML='';
  $('habitEmpty').style.display=habits.length?'none':'';
  var td=getToday();
  for(var hi=0;hi<habits.length;hi++){
    (function(habitIdx){
      var h=habits[habitIdx],start=new Date(h.start+'T00:00:00'),streak=h.checks.length;
      var card=document.createElement('div');card.className='h-card';
      var top=document.createElement('div');top.className='h-top';
      var nm=document.createElement('span');nm.className='h-name';nm.textContent=h.name;
      var rs=document.createElement('span');
      var sk=document.createElement('span');sk.className='h-streak';sk.textContent='🔥 '+streak+'/21';
      var dl=document.createElement('button');dl.className='h-del';dl.type='button';dl.textContent='✕';
      dl.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();if(confirm('删除此习惯计划？')){habits.splice(habitIdx,1);SS('habits',habits);renderHabits()}});
      rs.appendChild(sk);rs.appendChild(dl);top.appendChild(nm);top.appendChild(rs);
      var grid=document.createElement('div');grid.className='h-grid';
      for(var di=0;di<21;di++){
        (function(dayIdx){
          var dd=new Date(start);dd.setDate(dd.getDate()+dayIdx);
          var ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
          var checked=h.checks.indexOf(ds)>=0,isToday=ds===td,isFuture=ds>td,isPast=ds<td&&!checked;
          var el=document.createElement('div');var cls='h-day';
          if(checked)cls+=' checked';else if(isPast)cls+=' missed';
          if(isToday)cls+=' today';if(isFuture&&!checked)cls+=' future';
          el.className=cls;el.textContent=dayIdx+1;
          if(isToday)el.addEventListener('click',function(e){e.preventDefault();var idx=h.checks.indexOf(ds);if(idx>=0)h.checks.splice(idx,1);else h.checks.push(ds);SS('habits',habits);renderHabits()});
          grid.appendChild(el);
        })(di);
      }
      var pg=document.createElement('div');pg.className='h-prog';
      pg.textContent=streak>=21?'🎉 调查完结！习惯已养成！':'第 '+Math.min(streak+1,21)+' 天 · 还需坚持 '+(21-streak)+' 天';
      card.appendChild(top);card.appendChild(grid);card.appendChild(pg);wrap.appendChild(card);
    })(hi);
  }
}

// 给每条内容生成唯一ID（用标题的hash）
function getIntelId(item) {
  var s = item.title;
  var hash = 0;
  for (var i = 0; i < s.length; i++) {
    hash = ((hash << 5) - hash) + s.charCodeAt(i);
    hash = hash & hash; // 转32位整数
  }
  return 'intel_' + Math.abs(hash);
}

// 读取已看过的列表
function getSeenList() {
  return LS('seen') || [];
}

// 保存已看过的列表
function saveSeenList(list) {
  SS('seen', list);
}

// 获取未看过的内容
function getUnseenItems() {
  var seen = getSeenList();
  var unseen = [];
  for (var i = 0; i < contentPool.length; i++) {
    var id = getIntelId(contentPool[i]);
    if (seen.indexOf(id) === -1) {
      unseen.push(contentPool[i]);
    }
  }
  return unseen;
}

// 标记一条为已看
function markAsSeen(item) {
  var seen = getSeenList();
  var id = getIntelId(item);
  if (seen.indexOf(id) === -1) {
    seen.push(id);
    saveSeenList(seen);
  }
}

function initPlayer(src) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  var audio = new Audio();
  audio.crossOrigin = 'anonymous';
  audio.preload = 'metadata';
  audio.src = src;
  audio.volume = 0.7;
  currentAudio = audio;
  var playing = false;

  function fmt(s) {
    if (isNaN(s)) return '0:00';
    var m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  audio.addEventListener('loadedmetadata', function() {
    $('mpDur').textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', function() {
    if (audio.duration) {
      $('mpBarFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
      $('mpCur').textContent = fmt(audio.currentTime);
    }
  });

  audio.addEventListener('ended', function() {
    playing = false;
    $('mpPlay').textContent = '▶';
    $('mpCover').classList.remove('playing');
  });

  $('mpPlay').addEventListener('click', function(e) {
    e.preventDefault();
    if (playing) {
      audio.pause(); playing = false;
      $('mpPlay').textContent = '▶';
      $('mpCover').classList.remove('playing');
    } else {
      var p = audio.play();
      if (p && p.catch) p.catch(function() {});
      playing = true;
      $('mpPlay').textContent = '⏸';
      $('mpCover').classList.add('playing');
    }
  });

  $('mpBarWrap').addEventListener('click', function(e) {
    e.preventDefault();
    var rect = $('mpBarWrap').getBoundingClientRect();
    var ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (audio.duration) audio.currentTime = ratio * audio.duration;
  });

  $('mpVol').addEventListener('input', function() {
    audio.volume = parseInt($('mpVol').value) / 100;
  });
}
